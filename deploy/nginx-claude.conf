events {
    worker_connections 1024;
}

http {
    # --- [核心新增] Cloudflare 真实 IP 识别 ---
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    client_max_body_size 50M;
    client_body_buffer_size 1M;
    resolver 223.5.5.5 1.1.1.1 valid=30s ipv6=off;
    resolver_timeout 5s;

    # 1. HTTP 自动跳转 HTTPS
    server {
        listen 80;
        server_name sfire.top;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS 主服务
    server {
        listen 443 ssl http2;
        server_name sfire.top;

        ssl_certificate /etc/nginx/ssl_ip.crt; 
        ssl_certificate_key /etc/nginx/ssl_ip.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --- 通用代理设置 (抽离重复配置) ---
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_ssl_server_name on;
        proxy_connect_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- 统一安全门禁 ---
        # 只要 header 不对，下面所有 location 都进不去
        if ($http_x_my_gate_key != "Huoyuan2026") {
            return 403;
        }

        # --- 路由 A: 转发到 Gemini 官方 API ---
        # 访问地址: https://sfire.top/gemini/v1beta/models/...
        location /gemini/ {
            # 去掉路径中的 /gemini/ 转发给 Google
            rewrite ^/gemini/(.*)$ /$1 break;
            
            proxy_pass https://generativelanguage.googleapis.com;
            proxy_set_header Host generativelanguage.googleapis.com;
            proxy_ssl_name generativelanguage.googleapis.com;
        }

        # --- 路由 B: 转发到 OpenRouter (或未来的 Claude 中转站) ---
        location /wavespeed/ {
            # --- 1. 极致流式输出优化 ---
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            tcp_nopush on;
            tcp_nodelay on;

            # --- 3. 核心修复：SNI 与 Host (解决 502 的关键) ---
            proxy_pass https://llm.wavespeed.ai/v1/;
            
            proxy_ssl_server_name on;               # 必须：开启 SNI 扩展
            proxy_ssl_name llm.wavespeed.ai;       # 必须：设置 SNI 握手域名
            proxy_ssl_protocols TLSv1.2 TLSv1.3;   # 建议：指定协议版本
            
            proxy_set_header Host llm.wavespeed.ai; # 必须：后端识别 Host
            proxy_set_header Connection "";         # 建议：长连接优化
            proxy_http_version 1.1;

            # --- 4. 超时设置 ---
            proxy_connect_timeout 60s;
            proxy_read_timeout 600s;
        }

        # --- 路由 C: 备用中转站 (预留给 Claude) ---
        # 以后你有了 Claude 的中转地址，直接填在 proxy_pass
        location /claude/ {
            rewrite ^/claude/(.*)$ /v1/$1 break; # 假设中转站也是 OpenAI 格式
            proxy_pass https://api.anthropic.com; # 这里可以改成你未来的中转站地址
            proxy_set_header Host api.anthropic.com;
            proxy_ssl_name api.anthropic.com;
        }
    }
}