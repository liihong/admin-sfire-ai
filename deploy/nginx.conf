# SFire Admin Nginx 配置文件
# 后台管理系统部署在 /sfire-admin 路径下，根路径留给未来官网使用
# 
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/sites-available/sfire-admin
# 2. 创建符号链接: sudo ln -s /etc/nginx/sites-available/sfire-admin /etc/nginx/sites-enabled/
# 3. 确保前端 .env.production 中设置 VITE_PUBLIC_PATH=/sfire-admin
# 4. 测试配置: sudo nginx -t
# 5. 重新加载: sudo systemctl reload nginx


# 1. HTTP 强制跳转 HTTPS
server {
    location /static/ {
        alias /var/www/sfire-admin/backend/static/;
        autoindex on;
    }
    listen 80;
    server_name sourcefire.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    #location / {
            #return 301 https://$host$request_uri;

        # 核心配置：尝试寻找文件，如果找不到，最后指向 index.html
                try_files $uri $uri/ /index.html;
        #}
        # 后台管理系统路径
    location /sfire-admin {
        alias /var/www/html/sfire-admin;
        index index.html;
        try_files $uri $uri/ /sfire-admin/index.html;

        # 【关键】对 html 文件禁用强缓存，确保每次访问都能拿到最新的 JS 索引
        if ($request_filename ~* .*\.(?:htm|html)$){
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 缓存静态资源
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

# 2. HTTPS 生产配置
server {
    location /static/ {
        alias /var/www/sfire-admin/backend/static/;
        autoindex on;
    }
    listen 443 ssl http2;


    # SSL 证书路径（推荐使用 live 路径以方便自动续期）
    ssl_certificate /etc/letsencrypt/live/sourcefire.cn.pem;
    ssl_certificate_key /etc/letsencrypt/live/sourcefire.cn.key;

    # SSL 性能与安全优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;

    # 根目录定义
    root /var/www/html;
    index index.html;

    # 后台管理系统路径 (子路径部署)
    location /sfire-admin/ {
        # 使用 root 配合 try_files 解决 History 模式 404
        try_files $uri $uri/ /sfire-admin/index.html;

        # 【关键】对 html 文件禁用强缓存，确保每次访问都能拿到最新的 JS 索引
        if ($request_filename ~* .*\.(?:htm|html)$){
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 解决 MIME type "text/plain" 报错的关键：精确锁定静态资源路径
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # 必须显式再次指定 root，防止路径解析偏离
                 # 强制 JS 类型映射，防止因文件缺失导致返回 index.html

        }
    }
    
    
    # 1. 优先处理静态资源文件夹，强制指定 MIME
    location /sfire-admin/assets/ {
        alias /var/www/html/sfire-admin/assets/;
        autoindex on; # 调试时可开启，确认能看到文件

        # 强制针对扩展名返回正确类型，不依赖全局映射
        location ~* \.css$ {
            add_header Content-Type text/css;
        }
        location ~* \.js$ {
            add_header Content-Type application/javascript;
        }

        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 代理：针对 AI 智能体业务优化
    location /api/ {
        # 暗号校验：保护后端接口
            # if ($http_x_my_gate_key != "Huoyuan2026") {
            # return 403;
            #}

        proxy_pass http://127.0.0.1:8000; # 映射到 FastAPI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 核心：解决 AI 流式输出（Claude/GPT）卡顿问题
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 增加超时时间，防止 AI 思考过久导致 504
        proxy_read_timeout 600s;
    }
    
    
    # 未来官网预留
    location / {

        root   /var/www/html;
        index  index.html index.htm;

        # 核心配置：尝试寻找文件，如果找不到，最后指向 index.html
        try_files $uri $uri/ /index.html;
    }
}

# PC 用户端项目的配置
server {
    listen 80;
    server_name ai.sourcefire.cn;
    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl http2;
    server_name ai.sourcefire.cn;

    # SSL 证书 (注意：二级域名需要申请独立的证书，或者使用通配符证书)
    ssl_certificate /etc/letsencrypt/live/ai.sourcefire.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.sourcefire.cn/privkey.pem;

    # SSL 性能优化（复用你之前的安全参数）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    root /var/www/html/ai; # 你的 PC 项目存放路径
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 如果 PC 项目也需要调用 API，建议统一样式
    location /api/ {
        proxy_pass https://127.0.0.1:8000; # 对应你的 FastAPI 后端
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}